      <stop offset="0" stop-color="#fff1b8" stop-opacity=".95"/>
      <stop offset=".11" stop-color="#ff9a24" stop-opacity=".95"/>
      <stop offset=".24" stop-color="#f12d16" stop-opacity=".78"/>
      <stop offset=".43" stop-color="#6b0808" stop-opacity=".50"/>
      <stop offset=".76" stop-color="#080202" stop-opacity=".85"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8df"/>
